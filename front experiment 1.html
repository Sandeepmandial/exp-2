<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Interaction</title>
</head>
<style>
    body {
        font-family: 'Times New Roman', Times, serif;
        text-align: center;
        margin: 0;
        padding: 20px;
    }
    button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
    }
</style>
<body>
    <h1>Interactive Web Page</h1>
    <button id="change-bg-btn">Change Background Color</button>
    <script>
        document.getElementById('change-bg-btn').addEventListener('click', () => {
            document.body.style.backgroundColor = `hsl(${Math.floor(Math.random() * 360)}, 70%, 80%)`;
        });
    </script>
</body>
</html>
